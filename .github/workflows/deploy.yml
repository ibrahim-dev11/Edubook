name: Deploy Laravel to Server

on:
  push:
    branches:
      - main # ئەگەر ناوی برانچی سەرەکیت masterـە، ئەوا ئەمە بگۆڕە بۆ master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # تێبینی: ئەو بەشەی خوارەوە کە نووسراوە cd، پێویستە بیگۆڕیت بۆ شوێنی باکێندەکەت لە سێرڤەرەکە
            cd /home/khwenden/public_html
            
            # هێنانی کۆدە نوێیەکان
            git pull origin main
            
            # دابەزاندنی پاکەیجە نوێیەکان
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            
            # جێبەجێکردنی مایگرەیشن (بۆ داتابەیس)
            php artisan migrate --force
            
            # پاککردنەوەی کاشەکان و خێراکردنی سیستەمەکە
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
